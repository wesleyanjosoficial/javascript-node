<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>querySelectorAll</title>
</head>
<body>
    <div id="soccer-brazilian">
        <div class="times">Flamengo</div>
        <div class="times">Botafogo</div>
        <div class="times">São Paulo</div>
    </div>
    <div id="soccer-europe">
        <div class="times">Real Madrid</div>
        <div class="times">Barcelona</div>
        <div class="times">Juventos</div>
    </div>
    <script type="text/javascript">
        console.log(document.querySelectorAll('.times'))
        console.log(document.getElementById('soccer-europe').querySelectorAll('.times'))
        console.log(document.getElementById('soccer-europe').querySelectorAll('.times')[0].innerHTML)
    </script>
</body>
</html>
