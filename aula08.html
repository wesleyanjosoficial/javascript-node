<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Object Model(DOM)</title>
</head>
<body>
    <div>div 1</div>
    <div class="div2">div 2</div>
    <br>
    <p id="p1">paragrafo 1</p>
    <p id="p2">paragrafo 2</p>
    <script type="text/javascript">
        console.log(document.getElementsByTagName('div'))
        console.log(document.getElementsByTagName('div')[0].innerHTML)
        console.log(document.getElementsByTagName('br'))

        console.log(document.querySelector('div').innerHTML)
        console.log(document.querySelector('.div2').innerHTML)
        console.log(document.querySelector('#p2').innerHTML)
    </script>
</body>
</html>
