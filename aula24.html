<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>operadores atribuição</title>
</head>
<body>
    <script type="text/javascript">
        let x = 5
        let y = 2
        x = x + y
        console.log(x)

        x += y
        console.log(x)

        x -= y
        console.log(x)

        x /= y
        console.log(x)
        
        x %= y
        console.log(x)

        x++
        console.log(x)
    </script>
</body>
</html>
