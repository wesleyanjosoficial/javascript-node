<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>operadores aritmeticos</title>
</head>
<body>
    <script type="text/javascript">
        let x = 10
        let y = 5
        console.log(x + y)

        let r = x - y
        console.log(r)
        r = x / y
        console.log(r)
        r = x * y
        console.log(r)
        r = x ** y
        console.log(r)
        r = x % y
        console.log(r)

        let n1 = 8
        let n2 = 7
        let n3 = 6
        r = (n1 + n2 + n3) / 3
        console.log(r)
    </script>
</body>
</html>
