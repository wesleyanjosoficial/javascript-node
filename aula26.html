<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>operadores logicos</title>
</head>
<body>
    <script type="text/javascript">
        let x = 5
        console.log(x == '5')
        console.log(x != '5')
        console.log(x != 4)
        console.log(x == 5)
        console.log(x === 5)
        console.log(x !== 5)
        console.log(x !== '5')
        console.log(x < 10)
        console.log(x > 2)
        console.log(x >= 2)
        console.log(x <= 2)

        let m = 8
        let f = 80
        console.log(m >= 7 && f >= 80)
        console.log(m >= 7 || f >= 80)

        let age = 16
        let title = age >= 16 ? 'Pode votar' : 'Não pode votar'
        console.log(title)
    </script>
</body>
</html>
