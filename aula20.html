<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tipos de dados</title>
</head>
<body>
    <script type="text/javascript">
        //primitivos
        //string
        var name = 'wesley anjos'
        console.log(typeof(name))

        //number
        var age = 29
        console.log(typeof(age))

        //boolean
        var single = true
        console.log(typeof(single))

        //array
        var fruits = [
            'goiaba',
            'maça',
            'banana'
        ]
        console.log(typeof(fruits))

        //object
        var car = new Object()
        car.year = '2026'
        car.color = 'blue'
        console.log(typeof(car.year))

        //function
        var plus = function(a, b) {
            return a + b
        }
        console.log(typeof(plus))
    </script>
</body>
</html>
