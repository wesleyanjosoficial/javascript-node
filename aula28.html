<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loop</title>
</head>
<body>
    <ul>
        <li class="country">Brasil</li>
        <li class="country">EUA</li>
        <li class="country">Canadá</li>
        <li class="country">México</li>
    </ul>
    <script type="text/javascript">
        for (let c = 0; c <= 10; c++) {
            console.log(c)
        }

        c = 0
        while(c <= 10) {
            console.log(c)
            c++
        }

        let country = document.getElementsByClassName('country')
        for (let i = 0; i < country.length; i++) {
            console.log(country[i].innerHTML)
        }

        i = 0
        while (i < country.length) {
            console.log(country[i].innerHTML)
            i++
        }
    </script>
</body>
</html>
