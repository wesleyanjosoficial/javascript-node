<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loop</title>
</head>
<body>
    <script type="text/javascript">
        let fruits = {
            name: 'banana',
            price: 9.99,
            qtda: 1
        }

        let devices = [
            'smartphone',
            'laptop',
            'mouse'
        ]

        for (let value in fruits) {
            console.log(fruits[value])
        }

        for (let value of devices) {
            console.log(value)
        }
    </script>
</body>
</html>
