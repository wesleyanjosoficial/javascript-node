<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>childNodes</title>
</head>
<body>
    <button id="btn">Ver lista</button>
    <div>
        <h1>Title</h1>
        <p>Text</p>
    </div>
    <p id="result"></p>
    <script type="text/javascript">
        console.log(
            document.body.childNodes
        )

        var list = document.body.childNodes
        console.log(list[5].nodeName)
        console.log(list[5].nodeType)
        console.log(list[5].nodeValue)
        console.log(list[5].childNodes)
        console.log(list[5].childNodes[2])
        console.log(list[5].childNodes[3].childNodes[0].nodeValue)
    </script>
</body>
</html>
