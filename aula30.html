<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>function</title>
</head>
<body>
    <div id="result"></div>
    <script type="text/javascript">
        function plus(a, b) {
            return a + b
        } 

        document.getElementById('result').innerHTML = plus(5, 7)
    </script>
</body>
</html>
