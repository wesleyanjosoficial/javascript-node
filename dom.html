<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Document Object Model</title>
</head>
<body>
    <div id="fruit">
        Laranja
    </div>
    <div class="car">
        Gol
    </div>
    <div class="car">
        Camaro
    </div>
    <script type="text/javascript">
        console.log(
            document.getElementById('fruit').innerHTML,
            document.getElementsByClassName('car')[0].innerHTML
        )
    </script>
</body>
</html>
